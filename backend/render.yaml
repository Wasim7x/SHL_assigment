services:
  - type: web
    name: shl-recommender-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m scripts.build_index
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
    plan: free

  - type: web
    name: shl-recommender-frontend
    runtime: static
    buildCommand: cd ../frontend && npm install && npm run build
    staticPublishPath: ../frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://shl-recommender-api.onrender.com
    plan: free
